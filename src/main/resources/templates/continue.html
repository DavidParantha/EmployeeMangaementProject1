<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Employee Management - Continue?</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; }
        h2 { color: #333; margin-bottom: 30px; }
        .btn-group { display: flex; gap: 20px; justify-content: center; }
        .btn { display: inline-block; width: 100px; padding: 12px; font-size: 16px; font-weight: bold; color: white; text-decoration: none; border-radius: 6px; transition: background 0.2s; border: none; cursor: pointer; text-align: center; }
        .btn-yes { background-color: #28a745; }
        .btn-yes:hover { background-color: #218838; }
        .btn-no { background-color: #dc3545; }
        .btn-no:hover { background-color: #c82333; }
    </style>
</head>
<body>

<div class="container">
    <h2>Do you want to continue?</h2>
    <div class="btn-group">
        <a href="/" class="btn btn-yes">Yes</a>
        <a href="/exit" class="btn btn-no">No</a>
    </div>
</div>

</body>
</html>
