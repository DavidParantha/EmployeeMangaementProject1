<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Management - Raise Salary</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; display: flex; justify-content: center; }
        .form-container { width: 400px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #ffc107; color: #333; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; width: 100%; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #e0a800; }
        .back-btn { display: block; text-align: center; margin-top: 15px; color: #007bff; text-decoration: none; font-weight: bold; }
        .error-msg { color: red; font-weight: bold; margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Raise Salary</h2>
    <div th:if="${error}" class="error-msg" th:text="${error}">Error goes here</div>
    <form th:action="@{/raise-salary}" method="post" onsubmit="return confirm('Are you sure you want to raise the salary for this employee? (Yes/No)');">
        <div class="form-group">
            <label>Employee Name:</label>
            <input type="text" name="name" required />
        </div>
        <div class="form-group">
            <label>Amount to Raise:</label>
            <input type="number" step="0.01" name="amount" required />
        </div>
        <button type="submit">Raise Salary</button>
    </form>
    <a href="/" class="back-btn">Back to Menu</a>
</div>

</body>
</html>
