<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Management</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        h1, h2 { color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #007bff; color: white; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; }
        button:hover { background-color: #218838; }
        .flex-container { display: flex; gap: 40px; margin-top: 30px; }
        .flex-item { flex: 1; padding: 20px; background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <h1>Employee Management System</h1>
    
    <h2>Employee List</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Designation</th>
                <th>Salary</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="emp : ${employees}">
                <td th:text="${emp.id}">1</td>
                <td th:text="${emp.name}">John</td>
                <td th:text="${emp.age}">30</td>
                <td th:text="${emp.designation}">PROG</td>
                <td th:text="${emp.salary}">25000.0</td>
            </tr>
            <tr th:if="${#lists.isEmpty(employees)}">
                <td colspan="5" style="text-align: center;">No employees found. Please create one.</td>
            </tr>
        </tbody>
    </table>

    <div class="flex-container">
        <!-- CREATE EMPLOYEE FORM -->
        <div class="flex-item">
            <h2>Create Employee</h2>
            <form th:action="@{/create}" th:object="${newEmployee}" method="post" onsubmit="return confirm('Are you sure you want to create this employee? (Yes/No)');">
                <div class="form-group">
                    <label>Name:</label>
                    <input type="text" th:field="*{name}" required />
                </div>
                <div class="form-group">
                    <label>Age:</label>
                    <input type="number" th:field="*{age}" required />
                </div>
                <div class="form-group">
                    <label>Designation:</label>
                    <select th:field="*{designation}" required>
                        <option value="PROG">PROG (Salary: 25000)</option>
                        <option value="MANG">MANG (Salary: 30000)</option>
                        <option value="TEST">TEST (Salary: 20000)</option>
                    </select>
                </div>
                <button type="submit">Create</button>
            </form>
        </div>

        <!-- RAISE SALARY FORM -->
        <div class="flex-item">
            <h2>Raise Salary</h2>
            <form th:action="@{/raiseSalary}" method="post" onsubmit="return confirm('Are you sure you want to raise the salary for this employee? (Yes/No)');">
                <div class="form-group">
                    <label>Employee ID:</label>
                    <input type="number" name="id" required />
                </div>
                <div class="form-group">
                    <label>Amount to Raise:</label>
                    <input type="number" step="0.01" name="amount" required />
                </div>
                <button type="submit" style="background-color: #007bff;">Raise Salary</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
