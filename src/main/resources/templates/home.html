<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Employee Management - Home</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; }
        h1 { color: #333; margin-bottom: 30px; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        .btn { display: block; padding: 12px; font-size: 16px; font-weight: bold; color: white; text-decoration: none; border-radius: 6px; transition: background 0.2s; border: none; cursor: pointer; }
        .btn-create { background-color: #28a745; }
        .btn-create:hover { background-color: #218838; }
        .btn-display { background-color: #007bff; }
        .btn-display:hover { background-color: #0069d9; }
        .btn-raise { background-color: #ffc107; color: #333; }
        .btn-raise:hover { background-color: #e0a800; }
        .btn-exit { background-color: #dc3545; }
        .btn-exit:hover { background-color: #c82333; }
    </style>
</head>
<body>

<div class="container">
    <h1>Employee Management</h1>
    <div class="btn-group">
        <a href="/create" class="btn btn-create">1. CREATE</a>
        <a href="/display" class="btn btn-display">2. DISPLAY</a>
        <a href="/raise-salary" class="btn btn-raise">3. RAISE SALARY</a>
        <a href="/exit" class="btn btn-exit">4. EXIT</a>
    </div>
</div>

</body>
</html>
