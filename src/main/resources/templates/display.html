<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Management - Display</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; display: flex; justify-content: center; }
        .table-container { width: 800px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #007bff; color: white; }
        .action-container { margin-top: 25px; display: flex; justify-content: space-between; }
        .btn { display: inline-block; padding: 10px 15px; font-weight: bold; color: white; text-decoration: none; border-radius: 4px; }
        .btn-continue { background-color: #28a745; }
        .btn-continue:hover { background-color: #218838; }
        .btn-back { background-color: #6c757d; }
        .btn-back:hover { background-color: #5a6268; }
    </style>
</head>
<body>

<div class="table-container">
    <h2>Employee List</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Designation</th>
                <th>Salary</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="emp : ${employees}">
                <td th:text="${emp.id}">1</td>
                <td th:text="${emp.name}">John</td>
                <td th:text="${emp.age}">30</td>
                <td th:text="${emp.designation}">PROG</td>
                <td th:text="${emp.salary}">25000.0</td>
            </tr>
            <tr th:if="${#lists.isEmpty(employees)}">
                <td colspan="5" style="text-align: center;">No employees found.</td>
            </tr>
        </tbody>
    </table>
    
    <div class="action-container">
        <a href="/" class="btn btn-back">Back to Menu</a>
        <a href="/continue" class="btn btn-continue">Continue</a>
    </div>
</div>

</body>
</html>
